<div ng-if="bettingType!=7 && bettingType!=2 && bettingType!=8">
    <div class="row">
        <div class="col-sm-12">
            <button class="btn btn-primary" style="float:right" ng-click="ctrl.removeAll();">Remove All</button>
        </div>
    </div>
    <div class="row" ng-repeat="runner in marketRunner" >
        <div class="col-sm-3">
            {{runner.runner.name}}
        </div>
        <div class="col-sm-2" ng-if="bettingType==6 && gameType == 6">
            <input type="text" maxlength="7"
                   autocomplete="off"
                   kt-number-only allow-decimal="true"
                   ng-model="runner.handicap" class="form-control">
        </div>
        <div class="col-sm-7">
            <kt-radiobutton id="runnerstatus{{$index}}"
                            data-item="runner"
                            data-param-name="status"
                            data-optionlist="runnerStatusList"
                            notify-on-update="ctrl.runnerStatusChanged(selectedId,runner)"></kt-radiobutton>
        </div>
    </div>
</div>
<div class="row" ng-if="bettingType==7 || bettingType==2 || bettingType==8">
    <div class="col-sm-12">
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-newspaper-o"></i></span>
            <input type="number" maxlength="7"
                   autocomplete="off"
                   placeholder="{{::'runner.winner.placeholder'|translate}}"
                   ng-model="$parent.$parent.$parent.winningRuns" class="form-control">
        </div>
    </div>
</div>
