<div class="row">
    <div class="col-sm-12">
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-key"></i></span>
            <input type="text" minlength="1" maxlength="100"
                   placeholder="{{::'setting.name.placeholder' | translate}}"
                   required autofocus ng-model="setting.name" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-key"></i></span>
            <input type="text" minlength="1" maxlength="100"
                   placeholder="{{::'setting.key.placeholder' | translate}}"
                   required autofocus ng-model="setting.settingKey" class="form-control">
        </div>
       
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-list"></i></span>
            <textarea maxlength="5000" rows="5"
                      placeholder="{{::'setting.value.placeholder' | translate}}"
                      ng-model="setting.settingValue" class="form-control"></textarea>
        </div>
    </div>
</div>
