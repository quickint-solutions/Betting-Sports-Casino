<div class="col-sm-12">
    <div class="form-pannel">
        <div class="row">
            <div class="col-sm-2">
                <div class="event-heading">Casino Live Bets</div>
            </div>
        </div>
    </div>


    <kt-grid grid-id="kt-setting-grid"
             load-items="ctrl.getItems(params,filters)"
             show-total="true"
             data-items="gridItems"
             has-new-rights="true"
             list-new-items="listNewItems"
             cache-key="ktsettinggrid">

        <table ng-table="tableParams" class="table table-hover clickable"
               template-pagination="{{ :: $parent.$parent.paginationUrl }}">
            <tbody>
                <tr ng-repeat="item in $data track by item.id">
                    <td data-title="::'user.name.label' | translate"
                        data-sortable="'name'" data-header-class="'size-md'" class="size-md">
                        <span>{{item.username}} </span>
                    </td>
                    <td data-title="::'Table Name' | translate"
                        data-sortable="'tableName'" data-header-class="'size-lg'" class="size-lg">
                        <span>{{item.tableName}} </span>
                    </td>
                    <td data-title="::'Round Id' | translate"
                        data-sortable="'roundId'" data-header-class="'size-lg'" class="size-lg">
                        <span>{{item.roundId}} </span>
                    </td>
                    <td data-title="::'Provider' | translate"
                        data-sortable="'provider'" data-header-class="'size-md'" class="size-md">
                        <span>{{$parent.$parent.$parent.ctrl.getProvider(item.provider)}} </span>
                    </td>
                    <td data-title="::'Credit' | translate"
                        data-sortable="'credit'" data-header-class="'size-sm align-r'" class="size-sm align-r">
                        <span>{{item.credit}} </span>
                    </td>
                    <td data-title="::'Debit' | translate"
                        data-sortable="'debit'" data-header-class="'size-sm align-r'" class="size-sm align-r">
                        <span>{{item.debit}} </span>
                    </td>
                    <td data-title="::'Is PL?' | translate" data-header-class="'size-sm boolean'" class="size-sm boolean">
                        <span><i class="fa fa-check" ng-if="item.isPlRequest"></i> </span>
                    </td>
                    <td data-title="::'Created' | translate"
                        data-sortable="'createdOn'" data-header-class="'size-md'" class="size-md">
                        <span>{{item.createdOn | date:'dd-MM-yyyy HH:mm:ss'}} </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </kt-grid>
</div>
