<div class="games-title">
    <div class="wrap-game">
        <a class="a-tab_prev"  style="display: none;">prev</a>
        <ul>
            <li ng-repeat="event in eventTypes | filter:{showInMenu:true}" ng-class="{active : (event.id==selectedEventType)}">
                <a href="" ng-click="ctrl.tabClicked(event.id)">{{event.name}}</a>
            </li>
        </ul>
        <div class="ps__scrollbar-x-rail" style="width: 768px; left: 0px; bottom: 0px;"><div class="ps__scrollbar-x" tabindex="0" style="left: 0px; width: 558px;"></div></div>
        <div class="ps__scrollbar-y-rail" style="top: 0px; right: 0px;"><div class="ps__scrollbar-y" tabindex="0" style="top: 0px; height: 0px;"></div></div>
    </div>
</div>
