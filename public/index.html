        function close_info() {

        }

    <style>
        [ng-cloak].splash {
            display: table !important;
            z-index: 9999999999;
        }

        .dsplash {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            position: fixed !important;
            align-items: center;
            position: relative;
            z-index: 9999999999;
            transition: all 0.5s ease;
        }

        .logo-login {
            display: block;
            widows: 100%;
        }

        #load-inner {
            position: relative;
            text-align: center;
        }

            #load-inner i {
                font-size: 24px;
                color: rgb(255, 255, 255);
                margin-top: 40px;
            }

        .logo-login img {
            max-height: 65px;
            max-width: 250px;
            display: block;
        }

        .splash {
            /*background: #9a9342;*/
            display: none;
            text-align: center;
            margin: 0;
            padding: 0;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            text-align: center;
            width: 100%;
            height: 100%;
        }

            .splash .centered {
                display: table-cell;
                margin: 0 auto;
                vertical-align: middle;
                width: 50%;
            }
    </style>
    <style>
        .widgets {
            width: 100%;
        }

        .sr-lmt-plus__expand-icon {
            max-height: 100%;
            height: unset !important;
        }

        .sr-widget {
            border: rgba(0,0,0,0.12) solid 1px;
            margin-bottom: 24px;
        }
    </style>
