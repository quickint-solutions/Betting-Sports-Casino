<div class="casino-list-container center-container">
    <div>
        <div class="report-box casino-box fancy-page">
            <div class="container-fluid container-fluid-5 d-none-mobile" ng-init="selectedType='!0'">
                <div class="row row1">
                    <div class="col-md-12 tab-content">
                        <div class="casino-tabs">
                            <div class="casino-tabs-menu">
                                <ul id="casino-scroll-tab" class="nav nav-tabs">
                                    <li class="nav-item">
                                        <a class="nav-link" ng-class="{'active':selectedType=='!0'}" ng-click="selectedType='!0'">
                                            <img ng-src="{{webImagePath}}casino_icons/tab-icons/35.png"> <span>All Casino</span>
                                        </a>
                                    </li>
                                    <li class="nav-item" ng-repeat="ty in liveGameTypes">
                                        <a class="nav-link " ng-class="{'active':selectedType==ty.type}" ng-click="$parent.selectedType=ty.type">
                                            <img ng-src="{{webImagePath}}casino_icons/tab-icons/{{ty.type}}.png"> <span>{{ty.name}}</span>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <div class="tab-pane active">
                            <div class="casino-banners">
                                <div class="casino-banner-item" ng-repeat="lg in liveGamesMarkets | filter:{section:1} | filter:{type:selectedType}">
                                    <a ng-click="ctrl.openFDCasino(lg)">
                                        <div style="background-size: cover; background-position: center center; padding-top: 53.33%; background-image: url(&quot;{{webImagePath}}casino_icons/{{lg.img}}&quot;); "></div>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
