<table class="uib-yearpicker" role="grid" aria-labelledby="{{::uniqueId}}-title" aria-activedescendant="{{activeDateId}}">
    <thead>
        <tr>
            <th>
                <a class="btn btn-default btn-sm pull-left uib-left" ng-click="move(-1)" tabindex="-1">
                    <i class="fa fa-arrow-left"></i>
                </a>
            </th>
            <th colspan="{{::columns - 2}}">
                <a id="{{::uniqueId}}-title" role="heading" aria-live="assertive"
                   aria-atomic="true" class="btn btn-default btn-sm uib-title"
                   ng-click="toggleMode()" ng-disabled="datepickerMode === maxMode" tabindex="-1">
                    <strong>{{title}}</strong>
                </a>
            </th>
            <th>
                <a class="btn btn-default btn-sm pull-right uib-right" ng-click="move(1)" tabindex="-1">
                    <i class="fa fa-arrow-right"></i>
                </a>
            </th>
        </tr>
    </thead>
    <tbody>
        <tr class="uib-years" ng-repeat="row in rows track by $index">
            <td ng-repeat="dt in row" class="uib-year text-center" role="gridcell"
                id="{{::dt.uid}}"
                ng-class="::dt.customClass">
                <a class="btn btn-default"
                   uib-is-class="'btn-info' for selectedDt, 'active' for activeDt on dt"
                   ng-click="select(dt.date)"
                   ng-disabled="::dt.disabled"
                   tabindex="-1">
                    <span ng-class="::{'text-info': dt.current}">{{::dt.label}}</span>
                </a>
            </td>
        </tr>
    </tbody>
</table>
