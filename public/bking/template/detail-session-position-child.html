<tr  class="position-bg">
    <td style="padding-left:{{(d.userType-parentUserType+1) * 15}}px">
        <a class="p-user"  >
            {{d.username}}
            <span class="icons-list">
                <i class="fa icons float-r" ng-click="ctrl.open_Close_Check_Position(d,true);" ng-if="d.downline" ng-class="{'fa-sitemap':!d.open,'fa-sort-amount-asc fa-rotate-180':d.open}"></i>
                <i class="icon-ladder icons fa float-r" ng-click="ctrl.openBook($event,d)"></i>
            </span>

        </a>
    </td>
    <td><span class="market-team" ng-class="{'green-light':d.maxWin>=0,'negative':d.maxWin<0}">{{d.maxWin  | toRate}}</span></td>
    <td><span class="market-team" ng-class="{'green-light':d.pl>=0,'negative':d.pl<0}">{{d.pl  | toRate}}</span></td>
</tr>
<tr>
    <td colspan="3">
        <table>
            <tbody id="tbody_{{d.userId}}"></tbody>
        </table>
    </td>
</tr>
<tr ng-if="d.downline && d.open" style="background-color:rgba(245, 245, 245, 0);">
    <td colspan="3" style="padding:0px">
        <table ng-repeat="d in d.downline track by $index" style="margin-top:7px;">
            <thead>
                <tr>
                    <th style="padding:0px;"></th>
                    <th style="width:200px;padding:0px;"></th>
                    <th style="width:200px;padding:0px;"></th>
                </tr>
            </thead>
            <tbody ng-include="sessionpositionChildTemplate" ></tbody>
        </table>
    </td>
</tr>
