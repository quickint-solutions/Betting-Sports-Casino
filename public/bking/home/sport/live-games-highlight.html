<main class="main-container scroll_div rpt-animate">
    <div class="gamePlay all-gmplay">
        <div class="gamePLay-title">
            <div class="sid-img">
                <i class="icon-sport-{{currentEventName|joinme}}"></i>
            </div>
            <h2>{{currentEventName}}</h2>
        </div>
        <div class="no_this_evnt" ng-if="(highlights.length<=0 || !highlights) && !isRequestProcessing">
            {{'common.noevents.display' | translate}}
        </div>
        <div class="header-gm-name" ng-if="highlights.length>0">
            <div class="gmTitle">
                <div class="gmTitle-name-match">Game</div>
                <div class="gmTitle-name-set">state</div>
                <div class="gmTitle-set">
                    <span>1</span>
                    <span>x</span>
                    <span>2</span>
                </div>
            </div>
            <div class="gmContainer" ng-repeat="event in highlights">
                <div class="gmContent" ng-init="event.market.pin=ctrl.isMarketPinned(event.market.id)">
                    <div class="bt-country">
                        <div class="ball-img sid-img">
                            <i class="icon-sport-{{liveGameEventName|joinme}}"></i>
                        </div>
                        <button ng-click="ctrl.pinMe(event.market);">
                            <div class="ball-img sid-img">
                                <i ng-class="{'no-favourite':!event.market.pin,'favourite':event.market.pin}"></i>
                            </div>
                        </button>
                        <a class="country" ui-sref="base.home.sport.livegamesmarket({nodetype:1,id:ctrl.$stateParams.id,eventid:event.id,eventTypeId:event.market.eventType.id})">
                            <div class="country-1">
                                <div class="count-nm">
                                    {{event.market.event.name}}
                                </div>
                            </div>
                        </a>
                        <div class="sc-rBLzX ">
                            <div class="dv"><i class="tv-icon" aria-hidden="true"></i></div>
                        </div>
                        <div class="nk-play ">
                            <span> In-play</span>
                        </div>
                    </div>
                    <div class="factor"
                         ng-class="{'stop':event.market.temporaryStatus==3,'roundover':event.market.temporaryStatus==2,'bet-process':event.market.betInProcess,'suspend':event.market.marketStatus==3,'gameover':event.market.marketStatus==4} "
                         ng-if="event.market.gameType!=1 && event.market.gameType!=3 && event.market.gameType!=11 && event.market.gameType!=9">
                        <div class="fact">
                            <div class="fact-box back1" ng-init="m0 = event.market.marketRunner[0]" kt-animate-on-change="m0.backPrice[0].size">
                                <div class="fct" kt-click ng-click="ctrl.placeBet(event.market,1,m0.runner.id,m0.backPrice[0].price ? m0.backPrice[0].price : '',m0.runner.name,m0.backPrice[0].percentage ? m0.backPrice[0].percentage : '');">
                                    <kt-glc data-item="m0.backPrice[0]" data-show-size="{{event.market.bettingType==1}}"></kt-glc>
                                </div>
                            </div>
                            <div class="fact-box" ng-init="m0 = event.market.marketRunner[0]"
                                 kt-animate-on-change="m0.layPrice[0].size"
                                 ng-class="{'lay1':event.market.bettingType!=6,'no-fct':event.market.bettingType==6}">
                                <div class="fct" ng-if="event.market.bettingType!=6" kt-click ng-click="ctrl.placeBet(event.market,2,m0.runner.id,m0.layPrice[0].price ? m0.layPrice[0].price : '',m0.runner.name,m0.layPrice[0].percentage ? m0.layPrice[0].percentage : '');">
                                    <kt-glc data-item="m0.layPrice[0]" data-show-size="{{event.market.bettingType==1}}"></kt-glc>
                                </div>
                            </div>
                        </div>

                        <div class="fact">
                            <div class="fact-box back1" kt-animate-on-change="m2.backPrice[0].size" ng-init="m2 = event.market.marketRunner[1]" ng-if=" event.market.gameType==10"
                                 ng-class="{'no-fct':!m2}">
                                <div class="fct" ng-if="m2" kt-click ng-click="ctrl.placeBet(event.market,1,m2.runner.id,m2.backPrice[0].price ? m2.backPrice[0].price : '',m2.runner.name,m2.backPrice[0].percentage ? m2.backPrice[0].percentage : '');">
                                    <kt-glc data-item="m2.backPrice[0]" data-show-size="{{event.market.bettingType==1}}"></kt-glc>
                                </div>
                            </div>
                            <div class="fact-box back1" kt-animate-on-change="m2.backPrice[0].size" ng-init="m2 = event.market.marketRunner[2]" ng-if=" event.market.gameType!=10"
                                 ng-class="{'no-fct':!m2  || event.market.gameType==6}">
                                <div class="fct" ng-if="m2 && event.market.gameType!=6 " kt-click ng-click="ctrl.placeBet(event.market,1,m2.runner.id,m2.backPrice[0].price ? m2.backPrice[0].price : '',m2.runner.name,m2.backPrice[0].percentage ? m2.backPrice[0].percentage : '');">
                                    <kt-glc data-show-size="{{event.market.bettingType==1}}" data-item="m2.backPrice[0]"></kt-glc>
                                </div>
                            </div>

                            <div class="fact-box" ng-init="m2 = event.market.marketRunner[2]" kt-animate-on-change="m2.layPrice[0].size"
                                 ng-class="{'lay1':m2 && event.market.bettingType!=6,'no-fct':!m2 || event.market.bettingType==6}">
                                <div ng-if="m2 && event.market.bettingType!=6" class="fct"
                                     kt-click ng-click="ctrl.placeBet(event.market,2,m2.runner.id,m2.layPrice[0].price ? m2.layPrice[0].price : '',m2.runner.name,m2.layPrice[0].percentage ? m2.layPrice[0].percentage : '');">
                                    <kt-glc data-show-size="{{event.market.bettingType==1}}" data-item="m2.layPrice[0]"></kt-glc>
                                </div>
                            </div>
                        </div>
                        <div class="fact">
                            <div class="fact-box back1" ng-if="event.market.gameType==10" ng-init="m1 =event.market.marketRunner[2]" kt-animate-on-change="m1.backPrice[0].size">
                                <div kt-click class="fct" ng-click="ctrl.placeBet(event.market,1,m1.runner.id,m1.backPrice[0].price ? m1.backPrice[0].price : '',m1.runner.name,m1.backPrice[0].percentage ? m1.backPrice[0].percentage : '');">
                                    <kt-glc data-show-size="{{event.market.bettingType==1}}" data-item="m1.backPrice[0]"></kt-glc>
                                </div>
                            </div>
                            <div class="fact-box back1" ng-if="event.market.gameType!=10" ng-init="m1 =event.market.marketRunner[1]" kt-animate-on-change="m1.backPrice[0].size">
                                <div kt-click class="fct" ng-click="ctrl.placeBet(event.market,1,m1.runner.id,m1.backPrice[0].price ? m1.backPrice[0].price : '',m1.runner.name,m1.backPrice[0].percentage ? m1.backPrice[0].percentage : '');">
                                    <kt-glc data-show-size="{{event.market.bettingType==1}}" data-item="m1.backPrice[0]"></kt-glc>
                                </div>
                            </div>
                            <div class="fact-box " ng-class="{'lay1':event.market.bettingType!=6,'no-fct':event.market.bettingType==6}"
                                 ng-init="m1 = event.market.marketRunner[1]" kt-animate-on-change="m1.layPrice[0].size">
                                <div class="fct" ng-if="event.market.bettingType!=6" kt-click ng-click="ctrl.placeBet(event.market,2,m1.runner.id,m1.layPrice[0].price ? m1.layPrice[0].price : '',m1.runner.name,m1.layPrice[0].percentage ? m1.layPrice[0].percentage : '');">
                                    <kt-glc data-show-size="{{event.market.bettingType==1}}" data-item="m1.layPrice[0]"></kt-glc>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="factor"
                         ng-class="{'stop':event.market.temporaryStatus==3,'roundover':event.market.temporaryStatus==2,'bet-process':event.market.betInProcess,'suspend':event.market.marketStatus==3,'gameover':event.market.marketStatus==4} "
                         ng-if="event.market.gameType==1 || event.market.gameType==3 || event.market.gameType==11">
                        <div class="fact">
                            <div class="fact-box back1" ng-init="m0 = event.market.marketRunner[0]" kt-animate-on-change="m0.backPrice[0].size">
                                <div kt-click class="fct" ng-click="ctrl.placeBet(event.market,1,m0.runner.id,m0.backPrice[0].price ? m0.backPrice[0].price : '',m0.runner.name+'-'+event.market.pattiRunner[0].name,0,event.market.pattiRunner[0].id);">
                                    <kt-glc data-show-size="{{event.market.bettingType==1}}" data-item="m0.backPrice[0]"></kt-glc>
                                </div>
                            </div>
                            <div class="fact-box no-fct">
                            </div>
                        </div>
                        <div class="fact">
                            <div class="fact-box back1" kt-animate-on-change="m2.backPrice[0].size" ng-init="m2 = event.market.marketRunner[0]" ng-if="event.market.pattiRunner.length>2 "
                                 ng-class="{'no-fct':!m2}">
                                <div ng-if="m2 " kt-click class="fct"
                                     ng-click="ctrl.placeBet(event.market,1,m2.runner.id,m2.backPrice[0].price ? m2.backPrice[0].price : '',m2.runner.name+'-'+event.market.pattiRunner[2].name,0,event.market.pattiRunner[2].id);">
                                    <kt-glc data-show-size="{{event.market.bettingType==1}}" data-item="m2.backPrice[0]"></kt-glc>
                                </div>
                            </div>
                            <div class="fact-box no-fct" ng-if="event.market.pattiRunner.length<3"></div>
                            <div class="fact-box no-fct"></div>
                        </div>
                        <div class="fact">
                            <div class="fact-box back1" ng-init="m1 = event.market.marketRunner[0]" kt-animate-on-change="m1.backPrice[0].size">
                                <div class="fct" kt-click ng-click="ctrl.placeBet(event.market,1,m1.runner.id,m1.backPrice[0].price ? m1.backPrice[0].price : '',m1.runner.name+'-'+event.market.pattiRunner[1].name,0,event.market.pattiRunner[1].id);">
                                    <kt-glc data-show-size="{{event.market.bettingType==1}}" data-item="m1.backPrice[0]"></kt-glc>
                                </div>
                            </div>
                            <div class="fact-box no-fct"></div>
                        </div>
                    </div>
                    <div class="factor"
                         ng-class="{'stop':event.market.temporaryStatus==3,'roundover':event.market.temporaryStatus==2,'bet-process':event.market.betInProcess,'suspend':event.market.marketStatus==3,'gameover':event.market.marketStatus==4} "
                         ng-if="event.market.gameType==9">
                        <div class="fact">
                            <div class="fact-box back1" ng-init="m0 = event.market.marketRunner[0]" kt-animate-on-change="m0.backPrice[0].size">
                                <div class="fct" kt-click ng-click="ctrl.placeBet(event.market,1,m0.runner.id,m0.backPrice[0].price ? m0.backPrice[0].price : '',m0.runner.name+'-'+m0.metadata.up7down[0].name,0,m0.metadata.up7down[0].id);">
                                    <kt-glc data-show-size="{{event.market.bettingType==1}}" data-item="m0.backPrice[0]"></kt-glc>
                                </div>
                            </div>
                            <div class="fact-box no-fct">
                            </div>
                        </div>
                        <div class="fact">
                            <div class="fact-box no-fct"></div>
                            <div class="fact-box no-fct"></div>
                        </div>
                        <div class="fact">
                            <div class="fact-box back1" ng-init="m1 = event.market.marketRunner[0]" kt-animate-on-change="m1.backPrice[0].size">
                                <div class="fct" kt-click ng-click="ctrl.placeBet(event.market,1,m1.runner.id,m1.backPrice[0].price ? m1.backPrice[0].price : '',m1.runner.name+'-'+m1.metadata.up7down[1].name,0,m1.metadata.up7down[1].id);">
                                    <kt-glc data-show-size="{{event.market.bettingType==1}}" data-item="m1.backPrice[0]"></kt-glc>
                                </div>
                            </div>
                            <div class="fact-box no-fct"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
