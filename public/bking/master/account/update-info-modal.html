<div class="row">
    <div class="col-sm-12">
        Current Whatsapp is <b>{{data.whatsapp}}</b>
    </div>
    <div class="col-sm-12 mr-top-10">
        <div class="form-group" >
            <label for="cpass">New Whatsapp Number with country code, eg. 919825098250</label>
            <input  type="text" minlength="1" maxlength="20" 
                   placeholder="Enter new whatsapp number" kt-number-only
                   required ng-model="data.newWhatsapp" class="form-control">
        </div>
       
    </div>
</div>
