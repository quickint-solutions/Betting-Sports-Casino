<div class="row ">
    <div class="col-sm-12">
        <div class="input-group master_wrap">
            <label>Current transfarable balance : &nbsp;</label>
            <span ng-class="{'positive':item.dwType=='D','negative':item.dwType=='W'}">{{:: item.chips}}</span>
        </div>
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-money" aria-hidden="true"></i></span>
            <input type="text" kt-number-only minlength="1" maxlength="15" tabindex="1" allow-decimal="true"
                   ng-model="item.chips" class="form-control">
        </div>
    </div>
</div>
