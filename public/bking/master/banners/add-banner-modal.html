<div class="row">

    <div class="col-sm-12">
        <div> <b class="red">Note : </b> For better performance, upload only .jpg or .jpeg under 200kb</div>
    </div>

    <div class="col-sm-12 mr-top-20">
        <div class="form-group">
            <input type="file" kt-file-select="onFileSelect($files)" class="form-control"
                   accept=".jpg, .jpeg"
                   ng-model="data.imageContent">
        </div>
    </div>

    <div class="col-sm-6 mr-top-20">
        <div class="utr-img" ng-if="data.imageContent">
            <img ng-click="ctrl.showReceipt();" ng-src="{{data.imageContent}}" />
        </div>
    </div>
    <div class="col-sm-6 text-right mr-top-20"  >
        <input type="checkbox" id="chk-min" ng-model="data.isMobile" class="check">
        <label for="chk-min">For Mobile?</label>
    </div>
</div>
