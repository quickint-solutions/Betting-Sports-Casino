<div class="modal-header kt-model-header">
    <button id="{{modalOptions.id + '-header-close'}}" type="button" class="close" data-ng-click="modalOptions.close()">
        <i class="fa fa-times"></i>
    </button>
    <h4 class="modal-title">
        <i ng-if="modalOptions.icon" class="fa fa-{{modalOptions.icon}}"></i>
        {{modalOptions.header | translate}}
    </h4>
</div>
<div class="modal-body kt-model-body">
    <div class="row" ng-if="modalOptions.bodyUrl">
        <div class="col-sm-12">
            <kt-messages data-messages="messages"></kt-messages>
        </div>
    </div>
    <p ng-if="modalOptions.body && !(modalOptions.bodyHtml || modalOptions.bodyUrl)">{{modalOptions.body | translate}}</p>
    <div class="row" ng-if="modalOptions.bodyHtml">
        <div class="col-sm-12">
            <p ng-bind-html="modalOptions.bodyHtml"></p>
        </div>
    </div>

    <form role="form" ng-if="modalOptions.bodyUrl" name="modalOptions.modalForm" autocomplete="off">
        <div ng-include="modalOptions.bodyUrl"></div>

    </form>
</div>

<div class="modal-footer kt-model-footer">
    <button id="{{modalOptions.id + '-extra'}}" class="btn btn-primary kt-save-btn" data-ng-click="modalOptions.extraClick();" kt-click
            ng-disabled="modalOptions.modalForm.$invalid && modalOptions.bodyUrl" data-ng-show="modalOptions.extraButton != ''">
        {{modalOptions.extraButton | translate}}
    </button>
    <button id="{{modalOptions.id + '-ok'}}" class="btn btn-primary kt-save-btn" data-ng-click="modalOptions.ok();" kt-click
            ng-disabled="modalOptions.modalForm.$invalid && modalOptions.bodyUrl" data-ng-show="modalOptions.actionButton != ''">
        {{modalOptions.actionButton | translate}}
    </button>
    <button id="{{modalOptions.id + '-close'}}" class="btn btn-secondary kt-cancle-btn" data-ng-click="modalOptions.close()" 
            data-ng-show="modalOptions.closeButton !=''">
        {{modalOptions.closeButton | translate}}
    </button>
</div>
