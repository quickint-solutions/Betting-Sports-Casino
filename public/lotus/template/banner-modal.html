<div class="menu-popup">
    <div class="popup-overlay" ng-click="closeMe()"></div>
    <div class="popup-content receipt">
        <div class="receipt-img" style="width:{{screenWidth-50}}px;margin:auto auto">
            <div ng-repeat="d in data track by $index">
                <img ng-src="{{d.imageContent}}" />
            </div>
        </div>
        <a class="k-close" ng-click="closeMe()"><i class="fa fa-close" aria-hidden="true"></i></a>
    </div>
</div>
