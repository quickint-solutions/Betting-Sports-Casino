
<div class="account-statement float-l chg-pass" style="min-width: 300px;">
    <h1 class="event-heading">Change Password</h1>
    <kt-messages data-messages="messages"></kt-messages>
    <div class="row mr-top-24">
        <div class="col-sm-12">
            <form class="form-signin " name="changeform" ng-submit="ctrl.changePassword()">
                <div class="form-group">
                    <input type="password" minlength="1" maxlength="16" id="cpass1"
                           placeholder="Old Password" autocomplete="new-password"
                           required ng-model="currentPassword" class="form-control">
                </div>
                <div class="form-group">
                    <input type="password" minlength="6" maxlength="16" id="pass1"
                           placeholder="New Password" autocomplete="new-password"
                           required ng-model="newPassword" class="form-control">
                </div>
                <div class="form-group">
                    <input id="cfpass1" type="password" minlength="6" maxlength="16"
                           placeholder="Repeat Password"
                           required ng-model="confirmPassword" class="form-control">
                </div>
                <div class="form-group">
                    <button class="stake-btn button small-btn float-r" type="submit"
                            ng-disabled="changeform.$invalid"
                            style="width:45px;">
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="right-section float-r">
    <div class="right-inner">
        <div class="account-overview">
            <a ng-click="showBalance=!showBalance">
                available credit : <kt-glc-code data-special="true"
                                                data-item="{{balanceInfo.balance + balanceInfo.creditLimit + balanceInfo.exposure}}"></kt-glc-code>

                <i class="arrow-icon" ng-class="{'icon-angle-down':showBalance,'icon-angle-up':!showBalance}" aria-hidden="true"></i>
            </a>
            <div class="overview-detail" ng-class="{'show':showBalance}">
                <span class="credit-value" ng-show="balanceInfo.creditLimit!=0">
                    <b>credit Limit : </b>
                    <kt-glc-code data-special="false" data-item="{{balanceInfo.creditLimit}}"></kt-glc-code>
                </span>
                <span class="credit-value">
                    <b>Balance : </b>
                    <kt-glc-code data-special="false" class="positive" ng-class="{'negative':balanceInfo.balance<0,}"
                                 data-item="{{balanceInfo.balance}}"></kt-glc-code>
                </span>
                <span class="credit-value" ng-show="balanceInfo.bonus!=0">
                    <b>Bonus : </b>
                    <kt-glc-code data-special="false" class="positive" ng-class="{'negative':balanceInfo.bonus<0,}"
                                 data-item="{{balanceInfo.bonus}}"></kt-glc-code>
                </span>
                <span class="credit-value" ng-show="balanceInfo.bonusToRedeem!=0">
                    <b>Bonus To Redeem : </b>
                    <kt-glc-code data-special="false" class="positive" ng-class="{'negative':balanceInfo.bonusToRedeem<0,}"
                                 data-item="{{balanceInfo.bonusToRedeem}}"></kt-glc-code>
                </span>
                <span class="credit-value">
                    <b>Total Net Exposure : </b>
                    <kt-glc-code data-special="false" class="positive" ng-class="{'negative':balanceInfo.exposure<0,}"
                                 data-item="{{balanceInfo.exposure}}"></kt-glc-code>
                </span>
            </div>
        </div>
    </div>
</div>
