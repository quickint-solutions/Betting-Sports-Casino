<div class="row">
    <div class="col-sm-12">
        <div class="form-group" ng-if="!$parent.$parent.fromMember">
            <label for="cpass">Current Password</label>
            <input  type="password" minlength="1" maxlength="16" id="cpass"
                   placeholder="{{::'user.currentpassword.placeholder' | translate}}" autocomplete="new-password"
                   required ng-model="$parent.$parent.$parent.currentPassword" class="form-control">
        </div>
        <div class="form-group">
            <label for="pass">New Password</label>
            <input  type="password" minlength="6" maxlength="16" id="pass"
                   placeholder="{{::'user.newpassword.placeholder' | translate}}" autocomplete="new-password"
                   required ng-model="$parent.$parent.newPassword" class="form-control">
        </div>
        <div class="form-group">
            <label for="cfpass">Repeat Password</label>
            <input id="cfpass" type="text" minlength="6" maxlength="16"
                   placeholder="{{::'user.confirmpassword.placeholder' | translate}}"
                   required ng-model="$parent.$parent.confirmPassword" class="form-control">
        </div>
    </div>
</div>
