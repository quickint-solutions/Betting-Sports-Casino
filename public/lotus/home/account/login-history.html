<div class="login-history list-view">
    <h1 class="event-heading" ng-if="!fromMember">{{'loginhistory.label' | translate}}</h1>
    <div class="list-view-table table-bets" style="margin-top:13px;">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th class="align-l size-md"><span>{{'login.datetime.label' | translate}}</span></th>
                    <th class="align-l  size-md"><span>{{'logout.datetime.label' | translate}}</span></th>
                    <th class="size-smd boolean"><span>{{'ipaddress.label' | translate}}</span></th>
                    <th class="boolean"><span>{{'login.isp.label' | translate}}</span></th>
                    <th class="size-xl boolean "><span>{{'login.citystatecountry.label' | translate}}</span></th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="lh in loginHistory">
                    <td class="align-l size-md">
                        <kt-date data-date-value="lh.issuedOn"></kt-date>
                    </td>
                    <td class="align-l size-md">
                        <kt-date data-date-value="lh.expiresOn"></kt-date>
                    </td>
                    <td class="boolean size-smd">{{lh.remoteIp}}</td>
                    <td class="boolean">{{lh.provider}}</td>
                    <td class="size-xl boolean"><span>{{lh.location}}</span></td>

                </tr>
            </tbody>
        </table>
    </div>
</div><!-- login -->
