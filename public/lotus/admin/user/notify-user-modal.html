<div class="row">
    <div class="col-sm-8">
        <input type="file" id="apk_file" class="form-control" kt-file-model="ctrl.jsonDataFile" />
    </div>
    <div class="col-sm-4">
        <button type="button" class="btn btn-primary" ng-click="ctrl.processFile()">Submit</button>
    </div>
    <div class="col-sm-12 mr-top-10">
        <div class="row">
            <div class="col-sm-12" ng-show="apkPackages.length>0">
                <input type="checkbox" id="chk-pk-selectall" ng-model="$parent.$parent.allSelected" class="check"
                       ng-click="ctrl.appSelectionChanged(true)">
                <label for="chk-pk-selectall">Select All Applications</label>
            </div>
        </div>
    </div>
    <div class="col-sm-12 mr-top-10">
        <div class="row">
            <div class="col-sm-3" ng-repeat="a in apkPackages">
                <input type="checkbox" id="chk-pk-{{a.name}}" ng-model="a.selected" class="check" ng-click="ctrl.appSelectionChanged()">
                <label for="chk-pk-{{a.name}}">{{a.name}}</label>
            </div>
        </div>
    </div>
</div>
<div class="row mr-top-10">
    <div class="col-sm-4">
        <div class="input-group">
            <span class="input-group-addon">Priority</span>
            <select class="form-control" ng-model="model.priority" tabindex="1">
                <option value="HIGH">High</option>
                <option value="NORMAL">Normal</option>
            </select>
        </div>
    </div>
    <div class="col-sm-4">
        <div class="input-group">
            <span class="input-group-addon">Hours</span>
            <select class="form-control" ng-model="model.hours" tabindex="2">
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
        </div>
    </div>
    <div class="col-sm-4">
        <div class="input-group">
            <span class="input-group-addon">Minutes</span>
            <select class="form-control" ng-model="model.minutes" tabindex="3">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="40">40</option>
                <option value="50">50</option>
                <option value="60">60</option>
            </select>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-sm-12">
        <div class="input-group">
        <span class="input-group-addon">Title</span>
        <input type="text" minlength="1" maxlength="100"
        autocomplete="off" tabindex="4"
        required ng-model="model.title" class="form-control">
        </div>
    </div>
    <div class="col-sm-12">
        <div class="input-group">
        <span class="input-group-addon">Message</span>
        <input type="text" minlength="1" maxlength="100"
        autocomplete="off" tabindex="5"
        required ng-model="model.message" class="form-control">
        </div>
    </div>
    <div class="col-sm-12">
        <div class="input-group">
        <span class="input-group-addon">Image Url</span>
        <input type="text" minlength="1" maxlength="100"
        autocomplete="off" tabindex="6"
        ng-model="model.imgurl" class="form-control">
        </div>
    </div>
</div>
