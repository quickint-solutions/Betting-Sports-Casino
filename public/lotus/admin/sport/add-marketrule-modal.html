<div class="row">
    <div class="col-sm-12">
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-newspaper-o"></i></span>
            <input type="text" minlength="1" maxlength="100"
                   placeholder="{{::'marketrule.name.placeholder' | translate}}"
                   required autofocus ng-model="rule.name" class="form-control">
        </div>
        <div class="form-group">
            <textarea type="text"
                      placeholder="{{::'marketrule.rule.placeholder' | translate}}" multiple rows="10"
                      ng-model="rule.rule" class="form-control"></textarea>
        </div>
    </div>
</div>
