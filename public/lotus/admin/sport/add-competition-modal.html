<div class="row">
    <div class="col-sm-12">
        <div class="input-group">
            <label> {{::'eventtypes.label' | translate}} : &nbsp;</label>
            <span>{{competition.eventTypeName}}</span>
        </div>
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-newspaper-o"></i></span>
            <input id="eventtype" type="text" minlength="1" maxlength="100"
                   placeholder="{{::'competition.name.placeholder' | translate}}"
                   required autofocus ng-model="competition.name" class="form-control">
        </div>
    </div>
</div>
