<div class="row">
    <div class="col-sm-12">
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-address-card"></i></span>
            <input type="text" minlength="1" maxlength="100"
                   placeholder="Display name"
                   required autofocus ng-model="data.displayName" class="form-control">
            <span class="input-group-addon">Name</span>
        </div>

        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-globe"></i></span>
            <input type="text" minlength="1" maxlength="50"
                   placeholder="Market type code"
                   required ng-model="data.marketTypeCode" class="form-control">
            <span class="input-group-addon">Code</span>
        </div>
    </div>
</div>
