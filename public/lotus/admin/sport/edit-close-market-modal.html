<div class="row">
    <div class="col-sm-12">
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-newspaper-o"></i></span>
            <input id="eventtype" type="text" minlength="1" maxlength="100"
                   placeholder="{{::'market.name.placeholder' | translate}}"
                   required autofocus ng-model="market.name" class="form-control">
        </div>
      
        <div class="checkbox">
            <input type="checkbox" id="chk-isActive" ng-model="market.allowCommission" class="check">
            <label for="chk-isActive">{{::'market.allowcommission.label' | translate}}</label>
        </div>
       
    </div>
</div>
