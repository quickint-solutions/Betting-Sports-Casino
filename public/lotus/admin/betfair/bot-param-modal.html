<div class="row">
    <div class="col-sm-6">
        <div class="input-group ">
            <span class="input-group-addon">loss limit</span>
            <input type="text" maxlength="10" tabindex="1" autofocus
                   kt-number-only
                   placeholder="{{::'market.maxliability.placeholder' | translate}}"
                   ng-model="market.maxLiability" class="form-control">
        </div>
    </div>
    <div class="col-sm-6">
        <div class="input-group ">
            <span class="input-group-addon">max profit</span>
            <input type="text" maxlength="10" tabindex="2"
                   kt-number-only
                   placeholder="{{::'market.maxprofit.placeholder' | translate}}"
                   ng-model="market.maxProfit" class="form-control">
        </div>
    </div>
    <div class="col-sm-6">
        <div class="input-group ">
            <span class="input-group-addon">max bet</span>
            <input type="text" maxlength="10" tabindex="3"
                   kt-number-only
                   placeholder="{{::'market.maxbet.placeholder' | translate}}"
                   ng-model="market.maxBet" class="form-control">
        </div>
    </div>
    <div class="col-sm-6">
        <div class="input-group">
            <span class="input-group-addon">Group</span>
            <select class="form-control" ng-model="market.group" tabindex="4">
                <option ng-repeat="s in marketGroupList" value="{{s.id}}">
                    {{s.name}}
                </option>
            </select>
        </div>
    </div>

    <div class="col-sm-6">
        <div class="input-group">
            <span class="input-group-addon">Rule</span>
            <select class="form-control" ng-model="market.marketRuleId" tabindex="5">
                <option ng-repeat="s in marketRulesList" value="{{s.id}}">
                    {{s.name}}
                </option>
            </select>
        </div>
    </div>
    <div class="col-sm-6">
        <div class="input-group">
            <span class="input-group-addon">Temp Status</span>
            <select class="form-control" ng-model="market.temporaryStatus" tabindex="6">
                <option ng-repeat="t in temporaryStatusList" value="{{t.id}}">
                    {{t.name}}
                </option>
            </select>
        </div>
    </div>


    <div class="col-sm-6">
        <div class="input-group">
            <span class="input-group-addon">Volume Rate</span>
            <input type="text" minlength="1" maxlength="100" tabindex="7"
                   required ng-model="market.volumeRate" class="form-control">
        </div>
    </div>
    <div class="col-sm-6">
        <div class="input-group">
            <span class="input-group-addon">In-Play Volume Rate</span>
            <input type="text" minlength="1" maxlength="100" tabindex="8"
                   required autofocus ng-model="market.inPlayVolumeRate" class="form-control">
        </div>
    </div>


    <div class="col-sm-6">
        <div class="input-group">
            <span class="input-group-addon">Display Order</span>
            <input type="text" minlength="1" maxlength="200" tabindex="9"
                   required ng-model="market.displayOrder" class="form-control">
        </div>
    </div>
    <div class="col-sm-6">
        <div class="input-group ">
            <span class="input-group-addon">Allow Bet UpTo</span>
            <input type="text" maxlength="10" tabindex="10"
                   kt-number-only allow-decimal="true"
                   placeholder="{{::'market.allowbetupto.placeholder' | translate}}"
                   ng-model="market.allowBetUpTo" class="form-control">
        </div>
    </div>
    <div class="col-sm-6">
        <div class="input-group ">
            <span class="input-group-addon">Allow Bet DownTo</span>
            <input type="text" maxlength="10" tabindex="10"
                   kt-number-only allow-decimal="true"
                   placeholder="{{::'market.allowbetdownto.placeholder' | translate}}"
                   ng-model="market.allowBetDownTo" class="form-control">
        </div>
    </div>

    <div class="col-sm-6">
        <div class="input-group ">
            <span class="input-group-addon">Bet Delay</span>
            <input type="text" maxlength="10" tabindex="13"
                   kt-number-only
                   placeholder="{{::'market.betdelay.placeholder' | translate}}"
                   ng-model="market.betDelay" class="form-control">
        </div>
    </div>
    <div class="col-sm-6">
        <div class="input-group ">
            <span class="input-group-addon">Limit Odds Diff</span>
            <input type="text" maxlength="10" tabindex="14"
                   kt-number-only allow-decimal="true"
                   placeholder="{{::'market.limitoddsdiff.placeholder' | translate}}"
                   ng-model="market.limitOddsDiff" class="form-control">
        </div>
    </div>
    <div class="col-sm-6">
        <div class="input-group">
            <span class="input-group-addon">Score Source</span>
            <select class="form-control" ng-model="market.scoreSource" tabindex="15">
                <option ng-repeat="s in scoreSourceList" value="{{s.id}}">
                    {{s.name}}
                </option>
            </select>
        </div>
    </div>
    <div class="col-sm-6">
        <div class="input-group">
            <span class="input-group-addon">Score Source Id</span>
            <input type="text" minlength="1" maxlength="100" tabindex="16"
                   ng-model="market.scoreSourceId " class="form-control">
        </div>
    </div>
    <div class="col-sm-6" ng-hide="onlyRate">
        <div class="checkbox">
            <input type="checkbox" id="chk-syncData" ng-model="market.syncData">
            <label for="chk-syncData">{{::'market.syncdata.label' | translate}}</label>
        </div>
    </div>
    <div class="col-sm-6">
        <div class="checkbox">
            <input type="checkbox" id="chk-allowLimit" ng-model="market.allowLimit">
            <label for="chk-allowLimit">{{::'market.allowlimit.label' | translate}}</label>
        </div>
    </div>

    <div class="col-sm-6" ng-hide="onlyRate">
        <div class="checkbox">
            <input type="checkbox" id="chk-allowcommision" ng-model="market.allowCommission">
            <label for="chk-allowcommision">{{::'market.allowcommission.label' | translate}}</label>
        </div>
    </div>
    <div class="col-sm-6">
        <div class="checkbox">
            <input type="checkbox" id="chk-inPlayAllowLimit" ng-model="market.inPlayAllowLimit">
            <label for="chk-inPlayAllowLimit">{{::'market.inplayallowlimit.label' | translate}}</label>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-sm-6">
        <div class="dropdown">
            <a class="dropdown-toggle" id="dropdown-event" role="button" data-toggle="dropdown" href="">
                <div class="input-group">
                    <span class="input-group-addon">Bet Open Time</span>
                    <input type="text" class="form-control" required tabindex="17"
                           placeholder="{{::'event.betopentime.placeholder' | translate}}"
                           value="{{market.betOpenTime  | date:'dd-MM-yyyy hh:mm a Z'}}">
                </div>
            </a>
            <ul class="dropdown-menu" role="menu" aria-labelledby="dLabel">
                <datetimepicker data-ng-model="market.betOpenTime"
                                data-datetimepicker-config="{ dropdownSelector: '#dropdown-event' }"
                                data-before-render="ctrl.beforeRender($view, $dates, $leftDate, $upDate, $rightDate)" />
            </ul>
        </div>
    </div>

    <div class="col-sm-6">
        <div class="dropdown">
            <a class="dropdown-toggle" id="dropdown-closetime" role="button" data-toggle="dropdown" href="">
                <div class="input-group">
                    <span class="input-group-addon">Bet Close Time</span>
                    <input type="text" class="form-control" required tabindex="18"
                           placeholder="{{::'event.betclosetime.placeholder' | translate}}"
                           value="{{market.betCloseTime  | date:'dd-MM-yyyy hh:mm a Z'}}">
                </div>
            </a>
            <ul class="dropdown-menu" role="menu" aria-labelledby="dLabel1">
                <datetimepicker data-ng-model="market.betCloseTime"
                                data-datetimepicker-config="{ dropdownSelector: '#dropdown-closetime' }"
                                data-before-render="ctrl.beforeRender($view, $dates, $leftDate, $upDate, $rightDate)" />
            </ul>
        </div>
    </div>
</div>
