<div class="row">
    <div class="col-sm-12">
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-user"></i></span>
            <input id="Username" type="text" minlength="1" maxlength="100"
                   placeholder="{{::'betfair.username.placeholder' | translate}}"
                   required autofocus ng-model="account.username" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-user-secret"></i></span>
            <input id="password" type="text" minlength="1" maxlength="100"
                   placeholder="{{::'betfair.password.placeholder' | translate}}"
                   required ng-model="account.password" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-key"></i></span>
            <input id="appkey" type="text" minlength="1" maxlength="25"
                   placeholder="{{::'betfair.appkey.placeholder' | translate}}"
                   required ng-model="account.appKey" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-money"></i></span>
            <input id="balance" type="number" minlength="1" maxlength="10"
                   placeholder="{{::'betfair.balance.placeholder' | translate}}"
                   required ng-model="account.balance" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-list-alt"></i></span>
            <select class="form-control" ng-model="account.betfairAccountType">
                <option ng-repeat="s in accountTypeList" value="{{s.id}}">
                    {{s.name}}
                </option>
            </select>
        </div>
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-globe" aria-hidden="true"></i></span>
            <select class="form-control" ng-model="account.websiteId">
                <option ng-repeat="w in websites" value="{{w.id}}">
                    {{w.name}}
                </option>
            </select>
        </div>
        <div class="checkbox">
            <label>
                <input type="checkbox" id="chk_bfaccount_isactive" ng-model="account.isActive">
                <label for="chk_bfaccount_isactive">{{::'betfairaccount.isactive.label' | translate}}?</label>
            </label>
        </div>
    </div>
</div>
