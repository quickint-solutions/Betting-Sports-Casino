<div class="report-card">
    <div class="setting-popup">
        <h4 class="title">Set Stake Button Value</h4>
        <ul class="stake-edit">

            <li class="ok-btn line">
                <div class="left-btn col-odd">
                    <input type="text"
                           ng-model="s.stake" kt-number-only allow-decimal="true" positive-only="true"
                           ng-repeat="s in stakeConfig.stake | filter:{isActive:true}">
                </div>
            </li>
            <li class="align-r">
                <a class="btn mobile-btn btn-primary" ng-click="ctrl.saveStakeConfig()">Save</a>
            </li>

        </ul>
    </div>
</div>
