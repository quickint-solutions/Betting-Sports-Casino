<div class="report-card">
    <div class="account-statement">
        <h1 class="title">Change Password</h1>
        <kt-messages data-messages="messages"></kt-messages>
        <div class="mr-top-24 chng-pwd">
            <div class="col-sm-12">
                <form class="form-signin " name="changeform" ng-submit="ctrl.changePassword()">
                    <div class="form-group">
                        <input type="password" minlength="1" maxlength="16" id="cpass1"
                               placeholder="Old Password" autocomplete="new-password"
                               required ng-model="currentPassword" class="form-control">
                    </div>
                    <div class="form-group">
                        <input type="password" minlength="6" maxlength="16" id="pass1"
                               placeholder="New Password" autocomplete="new-password"
                               required ng-model="newPassword" class="form-control">
                    </div>
                    <div class="form-group">
                        <input id="cfpass1" type="password" minlength="6" maxlength="16"
                               placeholder="Repeat Password"
                               required ng-model="confirmPassword" class="form-control">
                    </div>
                    <div class="form-group">
                        <button class=" button btn-primary float-r mobile-btn" type="submit"
                                ng-disabled="changeform.$invalid">
                            Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
