<div class="main-content-block">
    <div class="home-middle-block">
        <div class="d-flex">
            <div class="middle-block home-page" ui-view="homecenter">

            </div>

            <div class="right-side-main-block" ng-hide="needsToHideRightSide">
                <div class="bet-slip-block" ng-if="hasCasino">
                    <div class="bet-slip-body">
                        <div class="bet-slip-main-view">
                            <div class="bet-slip-title">
                                <ul class="tab-list">
                                    <li class="tab-item">
                                        <button type="button" class="betlip-button">Live Casino Games</button>
                                    </li>
                                </ul>
                            </div>
                            <div class="slip-msg-block">
                                <div class="swiper-container swiper-container-horizontal" id="right-casino-box">
                                    <div class="swiper-button-next"></div>
                                    <div class="swiper-button-prev"></div>
                                    <div class="swiper-wrapper">
                                        <div class="swiper-slide">
                                            <div class="slider-item">
                                                <img ng-src="{{webImagePath}}casino/c1.jpg" />
                                            </div>
                                        </div>
                                        <div class="swiper-slide">
                                            <div class="slider-item">
                                                <img ng-src="{{webImagePath}}casino/c2.jpg" />
                                            </div>
                                        </div>
                                        <div class="swiper-slide">
                                            <div class="slider-item">
                                                <img ng-src="{{webImagePath}}casino/c3.jpg" />
                                            </div>
                                        </div>
                                        <div class="swiper-slide">
                                            <div class="slider-item">
                                                <img ng-src="{{webImagePath}}casino/c4.jpg" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bet-slip-block">
                    <div class="bet-slip-body popular-event">
                        <div class="bet-slip-main-view">
                            <div class="bet-slip-title">
                                <ul class="tab-list">
                                    <li class="tab-item">
                                        <button type="button" class="betlip-button">Popular Events</button>
                                    </li>
                                </ul>
                            </div>
                            <div class="popular-event-main-block">
                                <div ng-repeat="p in popularMarkets">
                                    <div class="popular-event-item">
                                        <a class="popular-event-block">
                                            <div class="popular-event-icon event-icon">
                                                <span>
                                                    <img ng-src="{{webImagePath}}/icons/{{p.eventTypeName|joinme}}.png" alt="cricket" width="18px">
                                                </span>
                                            </div>
                                            <div class="popular-event-main-detail">
                                                <div class="popular-event-detail">
                                                    <div class="popular-event-level-one">
                                                        <div class="popular-runner-one">{{p.marketRunner[0].runner.name}}</div>
                                                        <div class="popular-runner-two">{{p.marketRunner[1].runner.name}}</div>
                                                    </div>
                                                    <div class="d-flex">
                                                        <div class="popular-event-level-two">
                                                            <div class="popular-event-date-time">
                                                                <span>{{p.event.openDate | toDays}} {{p.event.openDate | date:'HH:mm'}}</span>
                                                                <div class="popular-event-fb-details">
                                                                    <div class="live-match one" ng-show="p.hasVideo">
                                                                        <span class="material-icons">ondemand_video</span>
                                                                    </div>
                                                                    <div class="popular-live-match two" ng-if="p.hasFancy">F</div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </a>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<a href="{{supportDetail.whatsapp}}" ng-show="supportDetail.whatsapp" class="whatsapp_link">
    <img ng-src="{{webImagePath}}icons/whatsapp.png" width="40px" alt="whatsapp">
</a>
