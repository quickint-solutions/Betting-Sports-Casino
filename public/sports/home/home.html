<div class="main-content-block sports-dashboard-shell">
    <div class="home-middle-block">
        <div class="d-flex">
            <div class="middle-block home-page" ui-view="center">

            </div>

            <div class="right-side-main-block">
                <div class="bet-slip-block" ng-hide="needsToHideCasino">
                    <div class="bet-slip-body" ng-if="hasCasino">
                        <div class="bet-slip-main-view">
                            <div class="bet-slip-title">
                                <ul class="tab-list">
                                    <li class="tab-item">
                                        <button type="button" class="betlip-button">Live Casino Games</button>
                                    </li>
                                </ul>
                            </div>
                            <div class="slip-msg-block">
                                <div class="swiper-container swiper-container-horizontal" id="right-casino-box">
                                    <div class="swiper-button-next"></div>
                                    <div class="swiper-button-prev"></div>
                                    <div class="swiper-wrapper">
                                        <div class="swiper-slide">
                                            <div class="slider-item">
                                                <img ng-src="{{webImagePath}}casino/c1.jpg" />
                                            </div>
                                        </div>
                                        <div class="swiper-slide">
                                            <div class="slider-item">
                                                <img ng-src="{{webImagePath}}casino/c2.jpg" />
                                            </div>
                                        </div>
                                        <div class="swiper-slide">
                                            <div class="slider-item">
                                                <img ng-src="{{webImagePath}}casino/c3.jpg" />
                                            </div>
                                        </div>
                                        <div class="swiper-slide">
                                            <div class="slider-item">
                                                <img ng-src="{{webImagePath}}casino/c4.jpg" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bet-slip-block" ng-show="isVideoActive && needsToHideCasino">
                    <div class="bet-slip-body">
                        <div id="pills-tab-destop" role="tablist" class="nav nav-pills live-tv-score mb-2">
                            <div class="d-flex justify-content-center">
                                <div role="presentation" class="nav-item mr-1">
                                    <a data-toggle="collapse" data-target="#collapseDestoplivetv"
                                       aria-expanded="true" aria-controls="collapseDestoplivetv" class="tab-item collapsed">
                                        <h3 class="d-flex align-items-center">
                                            <span class="material-icons mr-1">desktop_windows</span>
                                            <span>Live Tv</span>
                                        </h3>
                                    </a>
                                </div>
                            </div>
                            <div id="collapseDestoplivetv" aria-labelledby="headingOne" data-parent="#pills-tab-destop" class="main-card-body mt-2 collapse " style="">
                                <div class="sidebar-info-block-outer pad-0">
                                    <div ng-show="wcs_video" style="width:100%;">
                                        <kt-video-player wcs-config="wcs_video" style="height:180px" pause-me="{{ !showVideo}}" ng-if="wcs_video">
                                        </kt-video-player>
                                    </div>
                                    <div style="width:100%;height:100%" ng-show="bf_video">
                                        <iframe width="312" height="180" scrolling="no" ng-src="{{bf_video}}"></iframe>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bet-slip-block" ui-view="right_openbet">

                </div>
                <div class="bet-slip-block">
                    <div class="bet-slip-body popular-event">
                        <div class="bet-slip-main-view">
                            <div class="bet-slip-title">
                                <ul class="tab-list">
                                    <li class="tab-item">
                                        <button type="button" class="betlip-button">Popular Events</button>
                                    </li>
                                </ul>
                            </div>
                            <div class="popular-event-main-block">
                                <div ng-repeat="p in popularMarkets">
                                    <div class="popular-event-item">
                                        <a class="popular-event-block"
                                           ui-sref="base.home.sport.fullmarket({nodetype:4,id:p.event.competitionId,eventId:p.eventId,eventTypeId:h.event.eventType.id})">
                                            <div class="popular-event-icon event-icon">
                                                <span>
                                                    <img ng-src="{{webImagePath}}/icons/{{p.eventTypeName|joinme}}.png" alt="cricket" width="18px">
                                                </span>
                                            </div>
                                            <div class="popular-event-main-detail">
                                                <div class="popular-event-detail">
                                                    <div class="popular-event-level-one">
                                                        <div class="popular-runner-one">{{p.marketRunner[0].runner.name}}</div>
                                                        <div class="popular-runner-two">{{p.marketRunner[1].runner.name}}</div>
                                                    </div>
                                                    <div class="d-flex">
                                                        <div class="popular-event-level-two">
                                                            <div class="popular-event-date-time">
                                                                <span>{{p.event.openDate | toDays}} {{p.event.openDate | date:'HH:mm'}}</span>
                                                                <div class="popular-event-fb-details">
                                                                    <div class="popular-live-match two" ng-show="p.hasFancy">F</div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </a>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<a href="{{supportDetail.whatsapp}}" ng-show="supportDetail.whatsapp" class="whatsapp_link">
    <img ng-src="{{webImagePath}}icons/whatsapp.png" width="40px" alt="whatsapp">
</a>
