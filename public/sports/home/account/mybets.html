<div class="card">
    <div class="card-header"><h3>MY BETS</h3></div>
    <div class="card-header" style="border-radius: 0px;">
        <div class="wallet-dropdown show">
            <div class="wallet-active-block">
                <div class="wallet-active-buttons d-flex flex-row justify-content-center">
                    <a ui-sref="base.account.bets.current" class="btn" ui-sref-active="active">Current Bets</a>
                    <a ui-sref="base.account.bets.history" class="btn" ui-sref-active="active">Bet History</a>
                    <a ui-sref="base.account.bets.profitloss" class="btn" ui-sref-active="active">Profit Loss</a>
                    <a ui-sref="base.account.bets.fdprofitloss" class="btn" ui-sref-active="active">Casino Profit Loss</a>
                </div>
            </div>
        </div>
    </div>
    <div class="card-body" ui-view="betsreport" style="border-radius: 0px;">

    </div>
</div>
