<div class="main-account-statement-block other-page-section d-flex">
    <div class="main-section-vh">
        <div class="card">
            <div class="card-header"><h3>ACCOUNT STATEMENT</h3></div>
            <div class="card-header" style="border-radius: 0px;">
                <div class="filter-type-block">
                    <div class="date-filter d-flex flex-row flex-wrap mt-2">
                        <div class="d-flex mr-2">
                            <div class="calender-auto mx-datepicker ">
                                <div class="mx-input-wrapper">
                                    <input type="text" class="mx-input"
                                           uib-datepicker-popup="dd MMM yyyy"
                                           ng-model="search.fromdate"
                                           is-open="fopened"
                                           placeholder="{{'fromdate.placeholder' | translate}}"
                                           ng-click="fopened=true"
                                           close-text="Close"
                                           alt-input-formats="dd/MM/yyyy" />
                                    <i class="fa fa-calendar mx-icon-calendar">
                                    </i>
                                </div>
                            </div>
                            <div class="to-block">TO</div>
                            <div class="calender-auto mx-datepicker">
                                <div class="mx-input-wrapper">
                                    <input type="text" class="mx-input"
                                           uib-datepicker-popup="dd MMM yyyy"
                                           ng-model="search.todate"
                                           is-open="topened"
                                           placeholder="{{'todate.placeholder' | translate}}"
                                           ng-click="topened=true"
                                           close-text="Close"
                                           alt-input-formats="dd/MM/yyyy" /><i class="fa fa-calendar mx-icon-calendar">
                                    </i>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-success btn-sm search-btn mt-2 mt-md-0" ng-click="ctrl.refreshGrid();">
                            <i class="material-icons">search</i>
                            <span>Search</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body table-responsive p-0">
                <kt-grid grid-id="kt-accountstatement-grid"
                         load-items="ctrl.getAccountStatement(params)"
                         export-to-excel="ctrl.exportAccountStatement(params,1)"
                         export-to-pdf="ctrl.exportAccountStatement(params,2)"
                         name-param="id"
                         name-value-property="id"
                         show-total="true"
                         cache-key="ktaccountstatementgrid">

                    <table ng-table="tableParams" class="table table-hover clickable hide-header"
                           template-pagination="{{ :: $parent.$parent.paginationUrl }}">
                        <tbody ng-repeat="item in $data track by $index">
                            <tr class="no-tr-hover">
                                <td>
                                    <div class="d-flex">
                                        <div class="col-12">
                                            <strong>
                                                <u>
                                                    <i>
                                                        <span ng-if="item.name" title="{{item.name}}">{{item.name }}</span>
                                                        <span title="{{item.remarks}}" ng-if="item.remarks && !item.provider">{{item.remarks}} </span>
                                                        <span ng-if="item.provider">{{$parent.$parent.$parent.$parent.ctrl.getProvider(item.provider)}} </span>
                                                    </i>
                                                </u>
                                            </strong>
                                        </div>
                                    </div>
                                    <div class="d-flex flex-column">
                                        <div class="col-12">
                                            <label>{{'account.datetime.name.label' | translate}} : &nbsp;</label>
                                            <span>{{item.createdOn | date:'dd MMM HH:mm:ss'}} </span>
                                        </div>
                                        <div class="col-12">
                                            <label>{{'account.narration.name.label' | translate}} : &nbsp;</label>
                                            <span title="{{item.narration}}">{{item.narration}} </span>
                                        </div>
                                        <div class="col-12" ng-show="item.comment">
                                            <label>Comment : &nbsp;</label>
                                            <span title="{{item.comment}}">{{item.comment}} </span>
                                        </div>
                                    </div>

                                    <div class="d-flex flex-row">
                                        <div class="col-4 d-flex flex-column align-items-center">
                                            <label>{{'pl.label' | translate}} </label>
                                            <span class="text-success" ng-class="{'text-danger':item.balance<0}">{{item.balance | toRate}}</span>
                                        </div>
                                        <div class="col-4 d-flex flex-column align-items-center">
                                            <label>{{'common.creditlimit.label' | translate}}  </label>
                                            <span class="text-success" ng-show="item.accountType==13" ng-class="{'text-danger':item.creditTotal<0}">{{item.creditTotal | toRate}}</span>
                                            <span class="text-success" ng-show="item.accountType!=13">-</span>
                                        </div>
                                        <div class="col-4 d-flex flex-column align-items-center">
                                            <label>{{'common.total.label' | translate}}  </label>
                                            <span ng-class="{'text-success':item.total >= 0,'text-danger':item.total < 0}"> {{item.total  | toRate}} </span>
                                        </div>
                                    </div>

                                </td>
                            </tr>
                        </tbody>

                    </table>
                </kt-grid>
            </div>
        </div>
    </div>
    <div ng-include="'sports/template/footer.html'"></div>
</div>
