<div class="main-account-statement-block other-page-section d-flex">
    <div class="main-section-vh">
        <div class="card">
            <div class="card-header"><h3>BONUS STATEMENT</h3></div>
            <div class="card-header" style="border-radius: 0px;">
                <div class="filter-type-block">
                    <div class="date-filter d-flex flex-row flex-wrap mt-2">
                        <div class="d-flex mr-2">
                            <div class="calender-auto mx-datepicker ">
                                <div class="mx-input-wrapper">
                                    <input type="text" class="mx-input"
                                           uib-datepicker-popup="dd MMM yyyy"
                                           ng-model="search.fromdate"
                                           is-open="fopened"
                                           placeholder="{{'fromdate.placeholder' | translate}}"
                                           ng-click="fopened=true"
                                           close-text="Close"
                                           alt-input-formats="dd/MM/yyyy" />
                                    <i class="fa fa-calendar mx-icon-calendar">
                                    </i>
                                </div>
                            </div>
                            <div class="to-block">TO</div>
                            <div class="calender-auto mx-datepicker">
                                <div class="mx-input-wrapper">
                                    <input type="text" class="mx-input"
                                           uib-datepicker-popup="dd MMM yyyy"
                                           ng-model="search.todate"
                                           is-open="topened"
                                           placeholder="{{'todate.placeholder' | translate}}"
                                           ng-click="topened=true"
                                           close-text="Close"
                                           alt-input-formats="dd/MM/yyyy" /><i class="fa fa-calendar mx-icon-calendar">
                                    </i>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-success btn-sm search-btn mt-2 mt-md-0" ng-click="ctrl.refreshGrid();">
                            <i class="material-icons">search</i>
                            <span>Search</span>
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body table-responsive p-0">
                <kt-grid grid-id="kt-bonusstatement-grid"
                         load-items="ctrl.getBonusStatement(params)"
                         show-total="true"
                         cache-key="ktbonusstatementgrid">

                    <table ng-table="tableParams" class="table table-hover clickable hide-header"
                           template-pagination="{{ :: $parent.$parent.paginationUrl }}">
                        <tbody ng-repeat="item in $data track by $index">
                            <tr class="no-tr-hover">
                                <td>
                                    <div class="d-flex flex-column">
                                        <div class="col-12">
                                            <label>Code : &nbsp;</label>
                                            <span>{{item.bonusCode}} </span>
                                        </div>
                                        <div class="col-12">
                                            <label>Bonus Amount : &nbsp;</label>
                                            <span>{{item.bonusAmount | toRate}}</span>
                                        </div>
                                        <div class="col-12">
                                            <label>Bonus Date : &nbsp;</label>
                                            <span><kt-date data-date-value="item.createdOn" data-format="dd MMM yyyy, HH:mm"></kt-date></span>
                                        </div>
                                        <div class="col-12">
                                            <label>Expiry Date : &nbsp;</label>
                                            <span><kt-date data-date-value="item.expiredOn" data-format="dd MMM yyyy, HH:mm"></kt-date></span>
                                        </div>
                                        <div class="col-12">
                                            <label>Is Expired? : &nbsp;</label>
                                            <span>
                                                <span ng-show="item.isExpired">Yes</span>
                                                <span ng-show="!item.isExpired">No</span>
                                            </span>
                                        </div>
                                        <div class="col-12 d-flex flex-column align-items-center">
                                            <label>Required Turnover to Activate</label>
                                            <div class="position-relative w-100" ng-show="item.requiredTurnover>0">
                                                <uib-progressbar max="item.requiredTurnover | toRateOnly" value="item.currentTurnover | toRateOnly"
                                                                 type="info" class="progress-striped active">

                                                </uib-progressbar>
                                                <div class="position-absolute" style="top: 0; left: 30%; line-height: 18px; color: black;">
                                                    {{item.currentTurnover | toRateOnly}} / {{item.requiredTurnover | toRateOnly}}
                                                </div>
                                            </div>
                                            <div ng-show="item.requiredTurnover<=0">Instant</div>
                                        </div>
                                        <div class="col-12 d-flex flex-column align-items-center mt-2">
                                            <label>Required Turnover to Withdraw</label>
                                            <div class="position-relative w-100" ng-show="item.requiredWithdrawalTurnover>0">
                                                <uib-progressbar max="item.requiredWithdrawalTurnover | toRateOnly" value="item.currentWithdrawalTurnover | toRateOnly"
                                                                 type="info" class="progress-striped active">
                                                </uib-progressbar>
                                                <i class="position-absolute" style="top: 0; left: 30%; line-height: 18px; color: black;">
                                                    {{item.currentWithdrawalTurnover | toRateOnly}} / {{item.requiredWithdrawalTurnover | toRateOnly}}
                                                </i>
                                            </div>
                                            <span ng-show="item.requiredWithdrawalTurnover<=0">Instant</span>
                                        </div>
                                    </div>

                                </td>
                            </tr>
                        </tbody>

                    </table>
                </kt-grid>
            </div>
        </div>
    </div>
    <div ng-include="'sports/template/footer.html'"></div>
</div>
