<div class="row">
    <div class="col-xs-12" style="font-size:18px">
        {{bet.eventName}}
    </div>
    <div class="col-xs-12" style="font-size:16px">
        {{bet.marketName}}
    </div>
    <div class="col-xs-12" style="font-size:15px">
      {{bet.side==1 ? 'Backing' : 'Laying'}}&nbsp;<span style="font-weight:bold">{{bet.runnerName}}</span>
    </div>
</div>
<div class="row confirm-bet" ng-class="{'back-border':bet.side==1,'lay-border':bet.side==2}">
    <div class="col-xs-4">ODDS</div>
    <div class="col-xs-4">STAKE</div>
    <div class="col-xs-4">{{bet.side==1 ? 'PROFIT' : 'LIABILITY'}}</div>
    <div class="col-xs-4" style="font-weight:bold">{{bet.price}}</div>
    <div class="col-xs-4" style="font-weight:bold">{{bet.size}}</div>
    <div class="col-xs-4" style="font-weight:bold" >{{bet.pl | number:2}}</div>
</div>
<div class="td-popup">
    <span class="select-btn float-l" style="width:49.5%">
        <a class="btn cancle" ng-click="modalOptions.close()">Cancel</a>
    </span>
    <span class="select-btn place-btn float-r" style="width:49.5%">
        <a class="btn save dark-btn" ng-click="modalOptions.ok()" 
           kt-click >
            Place Bet
            <span >Profit: {{bet.pl | number:2}}</span>
        </a>
    </span>
</div>
