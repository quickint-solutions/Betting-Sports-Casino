<div style="display:flex;width:100%">
    <button class="minus" id="minus" ng-hide="disable || disableArrow" ng-click="ctrl.down()">-</button>
    <input ng-click="ctrl.focused()" kt-number-only allow-decimal="true" positive-only="true" ng-disabled="disable" ng-blur="ctrl.onLeave()" ng-model="value" >
    <button class="minus" id="plus" ng-hide="disable || disableArrow" ng-click="ctrl.up()">+</button>
</div>
