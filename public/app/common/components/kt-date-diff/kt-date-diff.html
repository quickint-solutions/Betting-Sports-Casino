<span ng-show="isFairTrade=='false'">
    <span ng-show="market.datediff">
        <i class="fa fa-clock-o fa-rotate-90" style="margin-right:3px;" ng-hide="showIcon=='false'"></i>
        Open in {{market.datediff}}
    </span>
</span>
<span ng-show="isFairTrade=='true'">
    <span ng-show="market.datediff">
        {{market.datediff}}
    </span>
</span>
