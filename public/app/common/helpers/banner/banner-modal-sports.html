<div class="row">
   
    <div class="col-sm-12">
        <div ng-class="{'promotion':isMobileView,'web-promotion':!isMobileView}">
            <div class="swiper-container swiper-container-horizontal mySwiperBanner">
                <div class="swiper-wrapper">
                    <div class="swiper-slide" ng-repeat="slide in data">
                        <div class="slider-item">
                            <img ng-src="{{slide.imageContent}}" style="margin:auto; width:100%;cursor:pointer;">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
