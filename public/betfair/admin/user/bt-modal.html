<div class="row">
    <div class="col-sm-12">
        <div class="row">
            <!-- <div class="col-sm-1 "></div>-->
            <div class="col-sm-6">
                <span class="set_comm">{{::'eventtypes.label' | translate}}</span>
            </div>
            <div class="col-sm-6">
                <span class="set_comm">{{::'bt.config.label'|translate}}</span>
            </div>
         <!-- <div class="col-sm-1"></div>-->
        </div>
    </div>
</div>
<div class="row " ng-repeat="e in eventTypes">
        <!-- <div class="col-sm-1"></div>-->
        <div class="col-sm-6">
            <span>{{::e.name}}</span>    
        </div>
        <div class="col-sm-6">
            <div class="input-group">
                <input type="text" minlength="1" maxlength="25"
                       autocomplete="off" kt-number-only allow-decimal="true"
                       ng-model="e.bt" class="form-control">
                <span class="input-group-addon"><i class="fa fa-percent" aria-hidden="true"></i></span>
            </div>
        </div>
        <!-- <div class="col-sm-1"></div>-->
</div>
