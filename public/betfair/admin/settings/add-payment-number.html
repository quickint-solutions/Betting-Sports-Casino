<div class="row">
    <div class="col-sm-12">
        <div class="input-group">
            <span class="input-group-addon">Name</span>
            <input type="text" minlength="1" maxlength="100"
                   placeholder="{{::'number.name.placeholder' | translate}}"
                   required autofocus ng-model="data.name" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon">Mobile No</span>
            <input type="text" minlength="1" maxlength="15"
                   placeholder="{{::'number.mobile.placeholder' | translate}}"
                   required ng-model="data.mobileNo" class="form-control" ng-disabled="existingMobileNo">
        </div>
        <div class="input-group">
            <span class="input-group-addon">Merchant Id</span>
            <input type="text" minlength="1" maxlength="100"
                   placeholder="{{::'number.merchantid.placeholder' | translate}}"
                   ng-model="data.merchantId" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon">Key</span>
            <input type="text" minlength="1" maxlength="1000"
                   placeholder="{{::'number.secretkey.placeholder' | translate}}"
                   ng-model="data.secretKey" class="form-control">
        </div>
        <div class="checkbox">
            <input type="checkbox" id="chk-registration" ng-model="data.isActive">
            <label for="chk-registration">{{::'betfairaccount.isactive.label' | translate}}?</label>
        </div>
    </div>
</div>
