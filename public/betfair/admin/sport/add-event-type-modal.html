<div class="row">
    <div class="col-sm-12">
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-newspaper-o"></i></span>
            <input id="eventtype" type="text" minlength="1" maxlength="100"
                   placeholder="{{::'eventtype.name.placeholder' | translate}}"
                   required autofocus ng-model="eventType.name" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon">Source</span>
            <select class="form-control" ng-model="eventType.eventSource">
                <option ng-repeat="s in eventSourceList" value="{{s.id}}">
                    {{s.name}}
                </option>
            </select>
        </div>
        <div class="input-group">
            <span class="input-group-addon">PT Code</span>
            <select class="form-control" ng-model="eventType.code">
                <option ng-repeat="s in ptCodes" value="{{s.id}}">
                    {{s.name}}
                </option>
            </select>
        </div>
        <div class="input-group mr-top-10" ng-if="eventType.eventSource==1">
            <span class="input-group-addon"><i class="fa fa-chain"></i></span>
            <input id="spurceid" type="text" minlength="1" maxlength="100"
                   placeholder="{{::'eventtype.sourceid.placeholder' | translate}}"
                   required ng-model="eventType.sourceId" class="form-control">
        </div>
        <div class="checkbox">
            <input type="checkbox" id="chk-isActive" ng-model="eventType.isActive" class="check">
            <label for="chk-isActive">{{::'eventtype.isactive.label' | translate}}</label>
        </div>
        <div class="checkbox">
            <input type="checkbox" id="chk-showInMenu" ng-model="eventType.showInMenu" class="check">
            <label for="chk-showInMenu">{{::'eventtype.showinmenu.label' | translate}}</label>
        </div>
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-sort-numeric-asc"></i></span>
            <input type="text" minlength="1" maxlength="3"
                   autocomplete="off" placeholder="{{::'eventtype.displayorder.placeholder' | translate}}"
                   ng-model="eventType.displayOrder" class="form-control">
        </div>
    </div>
</div>
