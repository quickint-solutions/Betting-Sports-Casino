<div class="row">
    <div class="col-sm-12">
        <div>
            <ui-select ng-model="runner.selectedRunner" ng-required="true">
                <ui-select-match class="ui-select-match" placeholder="{{::'market.search.runner.placeholder' | translate}}">
                   {{$select.selected.name}}
                </ui-select-match>
                <ui-select-choices class="ui-select-choices" repeat="runner in runnerList "
                                   refresh="$parent.$parent.$parent.ctrl.searchRunner($select.search)">
                    <div ng-bind-html="runner.name | highlight: $select.search"></div>
                </ui-select-choices>
            </ui-select>
        </div>
    </div>
</div>
<div class="row mr-top-10">
    <div class="col-sm-12">
        <div class="input-group">
            <span class="input-group-addon">Price</span>
            <input type="text" minlength="1" maxlength="10"
                   ng-model="runner.price" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon">BackSize</span>
            <input type="text" minlength="1" maxlength="10"
                   ng-model="runner.backSize" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon">LaySize</span>
            <input type="text" minlength="1" maxlength="10"
                   ng-model="runner.laySize" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon">Game Type</span>
            <select class="form-control" ng-model="runner.gameType">
                <option ng-repeat="s in gameTypeList" value="{{s.id}}">
                    {{s.name}}
                </option>
            </select>
        </div>
    </div>
</div>
