
<div class="col-sm-12">
    <header>
        <h1 class="title">{{'operator.currency.label' | translate}}</h1>
    </header>
    <kt-grid grid-id="kt-currency-grid"
             load-items="ctrl.getItems(params,filters)"
             show-total="true"
             has-new-rights="true"
             new-button-label="{{'common.button.addnew' | translate}}"
             go-to-new-state="ctrl.addEditCurrency()"
             cache-key="ktcurrencygrid">
        <table ng-table="tableParams" class="table table-hover clickable currency"
               template-pagination="{{ :: $parent.$parent.paginationUrl }}">
            <tbody>
                <tr ng-repeat="item in $data track by item.id">
                    <td data-title="::'currency.name.label' | translate" data-sortable="'name'"
                        data-header-class="'size-lg'" class="size-lg"
                        ng-click="$parent.$parent.$parent.ctrl.addEditCurrency(item)">
                        <span title="{{item.name}}">{{item.name}} </span>
                    </td>
                    <td data-title="::'currency.code.label' | translate" data-sortable="'code'"
                        data-header-class="'size-xl'" class="size-xl">
                        <span title="{{item.code}}">{{item.code}}</span>
                    </td>
                    <td data-title="::'currency.rate.label' | translate" data-sortable="'rate'"
                        data-header-class="'size-xl'" class="size-xl">
                        <span title="{{item.rate}}">{{item.rate}}</span>
                    </td>
                    <td data-title="::'currency.css.label' | translate" data-sortable="'rate'"
                        data-header-class="'size-xl'" class="size-xl">
                        <span title="{{item.cssClass}}">{{item.cssClass}}</span>
                    </td>
                    <td data-title="::'currency.fractional.label' | translate" data-sortable="'rate'"
                        data-header-class="'size-xl'" class="size-xl">
                        <span title="{{item.fractional}}">{{item.fractional}}</span>
                    </td>
                    <td data-title="::'grid.button.action.header' | translate"
                        data-header-class="'boolean'" class=" boolean">
                        <a id="btnEdit{{$index}}" class="btn btn-light" title="Edit Website"
                           ng-click="$parent.$parent.$parent.ctrl.addEditCurrency(item)">
                            <i class="fa fa-pencil"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </kt-grid>
</div>
