
<div class="account-statement">
    <h1 class="title">Credit Statement</h1>
    <div class="filter-panel">
        <ul class="input-list">
            <li>
                <div class="input-group">
                    <label>From</label>
                    <input type="text" class="form-control"
                           uib-datepicker-popup="dd MMM yyyy"
                           ng-model="search.fromdate"
                           is-open="fopened"
                           placeholder="{{'fromdate.placeholder' | translate}}"
                           ng-click="fopened=true"
                           close-text="Close"
                           alt-input-formats="dd/MM/yyyy" />
                </div>
            </li>
            <li>
                <div class="input-group">
                    <label>To</label>
                    <input type="text" class="form-control"
                           uib-datepicker-popup="dd MMM yyyy"
                           ng-model="search.todate"
                           is-open="topened"
                           placeholder="{{'todate.placeholder' | translate}}"
                           ng-click="topened=true"
                           close-text="Close"
                           alt-input-formats="dd/MM/yyyy" />
                </div>
            </li>
            <li>
                <a class="btn small-btn search_btn" ng-click="ctrl.refreshGrid();">
                    <i class="fa fa-search"></i> {{'common.button.search' | translate}}
                </a>
            </li>
        </ul>
    </div>
    <div class="table-bets" style="margin-top:6px">
        <kt-grid grid-id="kt-creditstatement-grid"
                 load-items="ctrl.getCreditStatement(params)"
                 show-total="false"
                 can-i-load="canILoad"
                 cache-key="ktcreditstatementgrid">

            <table ng-table="tableParams" class="table table-hover clickable "
                   template-pagination="{{ :: paginationUrl }}">
                <tbody class="info-text">
                    <tr ng-repeat="item in $data track by $index">
                        <td header-class="'size-md align-l'" class="size-md align-l" data-title="'Date'">
                            <span>
                                <kt-date data-date-value="item.createdOn" data-format="dd/MM/yyyy HH:mm:ss"></kt-date>
                            </span>
                        </td>
                        <td header-class="'boolean size-xl'" class="boolean size-xl" data-title="'Description'">
                            <span title="{{item.narration}}">{{item.narration | shortme:70}} </span>
                        </td>
                        <td class="align-l" header-class="'align-l'" data-title="'To/From'">
                            <span title="{{item.remarks}}">{{item.remarks | shortme:70}} </span>
                        </td>
                        <td class="size-smd boolean" header-class="'size-smd boolean'" data-title="'Amount'">
                            <span class="positive" ng-class="{'negative':item.balance<0}">{{item.balance  | toRate}} </span>
                        </td>
                        <td class="size-smd boolean" header-class="'size-smd boolean'" data-title="'Credit Balance'">
                            <span title="{{item.total | toRate }}" ng-class="{'positive':item.total >= 0,'negative':item.total < 0}">{{item.total  | toRate}} </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </kt-grid>
    </div>
</div>
