<div class="row">
    <div class="col-sm-12">
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-code"></i></span>
            <input id="code" type="text" minlength="1" maxlength="5"
                   placeholder="{{::'language.code.placeholder' | translate}}"
                   required autofocus ng-model="$parent.$parent.code" class="form-control">
        </div>
        <div class="input-group">
            <span class="input-group-addon"><i class="fa fa-language"></i></span>
            <input id="name" type="text" minlength="1" maxlength="200"
                   placeholder="{{::'language.name.placeholder' | translate}}"
                   required autofocus ng-model="$parent.$parent.name" class="form-control">
        </div>
    </div>
</div>
