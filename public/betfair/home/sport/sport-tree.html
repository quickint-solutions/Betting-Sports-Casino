<div class="bf-row no-bottom-gutter nested-scrollable-pane-parent accordion-pane-links-4 collapsed-pane hidden-when-left-side-collapsed accordion-pane-links-2">
    <div class="bf-col-24-24 nested-scrollable-pane-parent no-right-gutter">
        <div class="favourites-container collapsed" ng-class="{'collapsed': myMarkets.data.collapsed == true}">
            <div class="favourites-title">
                <div class="star-icon" ng-class="{'disabled': !myMarkets || myMarkets.length <= 0}">
                </div>
                <span>My Markets</span>
                <svg class="svg-icon-default expand-arrow" data-icon="arrow-light" data-style="expand-arrow" viewBox="0 0 100 100">
                    <path d="M48.889,78.733L0.074,29.915l7.769-6.652l41.045,41.059l43.276-41.059l7.761,6.652L48.889,78.733z"></path>
                </svg>
            </div>
        </div>
    </div>
</div><div class="bf-row no-bottom-gutter nested-scrollable-pane-parent extra-links-space-3 hidden-when-left-side-collapsed extra-links-space-2">
    <div class="bf-col-24-24 nested-scrollable-pane-parent no-right-gutter">
        <div class="navigation-container">
            <div>
                <div class="navigation-title">
                    <span>Sports</span>
                    <svg class="svg-icon-default expand-arrow" data-icon="arrow-light" data-style="expand-arrow" viewBox="0 0 100 100">
                        <path d="M48.889,78.733L0.074,29.915l7.769-6.652l41.045,41.059l43.276-41.059l7.761,6.652L48.889,78.733z"></path>
                    </svg>
                </div>
                <div class="navigation-container navigation-container-deprecated">
                    <div class="navigation-content">
                        <ul class="section top-navigation">
                            <li>
                                <span>
                                    <div class="scrollable-panes-height-taker">
                                        <div class="nested-scrollable-panes-wrapper bf-row">
                                            <div class="bf-col-24-24 nested-scrollable-pane">
                                                <ul class="section  active-section">
                                                    <li ng-if="breadcrumb.length>0" class="node">
                                                        <a class="navigation-link" ui-sref="base.home">
                                                            All Sports
                                                        </a>
                                                    </li>
                                                    <li ng-repeat="b in breadcrumb track by $index" ng-if="breadcrumb" class="node">
                                                        <a ng-click="ctrl.breadcrumbClick(b);" class="navigation-link open active-node">
                                                            {{b.name}}
                                                        </a>
                                                    </li>
                                                    <li class="node" ng-repeat="sport in sportTreeList">
                                                        <a class="navigation-link"
                                                           ng-if="sport.sportNodeType != 4  &&  !isRacing"
                                                           ng-click="ctrl.treeClick(sport.sportNodeType,sport.id,sport.name)">
                                                            {{sport.name}}
                                                        </a>
                                                        <a ng-if="sport.sportNodeType == 4 &&  !isRacing" class="navigation-link"
                                                           ng-click="ctrl.treeClick(2,ctrl.$stateParams.id,sport.name,sport.id)">
                                                            {{sport.name}}
                                                        </a>
                                                        <a ng-if="isRacing" ng-click="ctrl.treeClick(1,ctrl.$stateParams.id,'',sport.id)" class="navigation-link"
                                                           ng-class="{'active':sport.id==ctrl.$state.params.marketid}">
                                                            <kt-date data-date-value="sport.startTime" data-format="HH:mm"></kt-date>&nbsp;{{sport.event.raceName}}
                                                        </a>
                                                    </li>

                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div><div class="bf-row no-bottom-gutter hidden-when-left-side-collapsed">
    <div class="bf-col-24-24 no-right-gutter">
        <div class="navigation-extra-links-container">
            <div>
                <ul class="section bottom-navigation row-wrapper">
                    <li class="node">
                        <a class="navigation-link bottom-navigation-link nav-extra-next-horse-racing mod-link">Next Horse Race</a>
                    </li>
                    <li class="node">
                        <a class="navigation-link bottom-navigation-link nav-extra-next-horse-racing mod-link">Sports on TV</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
