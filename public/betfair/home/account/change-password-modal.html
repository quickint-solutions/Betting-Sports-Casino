<div class="row">
    <div class="col-sm-12">
        <div class="input-group" ng-if="!$parent.$parent.fromMember">
            <label class="label-text">Current Password </label>
            <div class="div-input">
                <input type="{{c_c_showVPass ? 'text' : 'password'}}" minlength="1" maxlength="16"
                       placeholder="Current password *" autocomplete="new-password"
                       required ng-model="$parent.$parent.$parent.currentPassword" class="login-input">
                <i class="fa fa-eye" ng-hide="c_c_showVPass" ng-click="c_c_showVPass=!c_c_showVPass"></i>
                <i class="fa fa-eye-slash" ng-show="c_c_showVPass" ng-click="c_c_showVPass=!c_c_showVPass"></i>
            </div>
        </div>
        <div class="input-group">
            <label class="label-text">New Password </label>
            <div class="div-input">
                <input type="{{c_n_showVPass ? 'text' : 'password'}}" minlength="6" maxlength="16"
                       placeholder="New password *" autocomplete="new-password"
                       required ng-model="$parent.$parent.newPassword" class="login-input">
                <i class="fa fa-eye" ng-hide="c_n_showVPass" ng-click="c_n_showVPass=!c_n_showVPass"></i>
                <i class="fa fa-eye-slash" ng-show="c_n_showVPass" ng-click="c_n_showVPass=!c_n_showVPass"></i>
            </div>
        </div>
        <div class="input-group">
            <label class="label-text">Confirm Password </label>
            <div class="div-input">
                <input id="confirmPassword" type="text" minlength="6" maxlength="16"
                       placeholder="Confirm password *"
                       required ng-model="$parent.$parent.confirmPassword" class="login-input">

            </div>
        </div>
    </div>
</div>
