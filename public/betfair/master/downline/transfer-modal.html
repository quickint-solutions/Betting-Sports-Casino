<div class="row ">
    <div class="col-sm-12">
        <div class="input-group master_wrap">
            <label>Transfer Amount : &nbsp;</label>
            <span ng-class="{'positive':item.dwType=='D','negative':item.dwType=='W'}" class="bold">{{totalChips}}</span>
        </div>
    </div>
    <div class="col-sm-12">
        <div>
            <input type="number" kt-number-only  tabindex="1" allow-decimal="true"
                     string-to-number max="{{totalChips}}" min="0"
                   ng-model="item.chips" class="form-control">
        </div>
    </div>
    <div class="col-sm-12 " style="padding-top:20px;">
        <div>
            <textarea maxlength="100" multiple rows="3" tabindex="2"
                      ng-model="item.comment" class="form-control"></textarea>
        </div>
    </div>
</div>
